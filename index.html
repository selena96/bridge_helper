<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridž - test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .category-btn {
            display: block;
            margin: 10px 0;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-btn:hover {
            opacity: 0.9;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .question-container {
            display: none;
        }

        .answer-btn {
            padding: 10px;
            border: 2px solid #ccc;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .answer-btn.correct {
            background-color: green;
            color: white;
        }

        .answer-btn.wrong {
            background-color: red;
            color: white;
        }

        .answer-btn.correct-other {
            background-color: #8bc34a;
            color: white;
        }

        .hint-btn {
            margin: 10px 0;
            background-color: #f0c14b;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .explanation {
            margin-top: 20px;
            background-color: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
        }

        .score {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }

        .next-btn {
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .next-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bridž - test</h1>
    <div id="menu" class="button-container">
        <button class="category-btn" style="background-color: #8fce00;" onclick="startCategory('easy')">Brojanje poena</button>
        <button class="category-btn" style="background-color: #ff9800;" onclick="startCategory('medium')">Brojanje štihova</button>
        <button class="category-btn" style="background-color: #f44336;" onclick="startCategory('hard')">Brojanje štihova 2</button>
    </div>

    <div id="question-section" class="question-container">
        <h2 id="question-title"></h2>
        <p id="question-text"></p>
        <div id="answers-container"></div>
        <button id="hint-btn" class="hint-btn" onclick="showHint()">Prikazi hint</button>
        <div id="explanation" class="explanation" style="display: none;"></div>
        <div class="score" id="score"></div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()" disabled>Dalje</button>
    </div>
</div>

<script>
    const questions = {
        easy: [
            {
                question: "Koliko poena ima ova ruka? KQJx ATxx xxx Qx",
                answers: ["10", "12", "14", "8"],
                correctAnswer: 1,
                hint: "As vredi 4 poena, kralj 3, dama 2 i pub 1.",
                explanation: "Prva boja je pik i u njemu imamo 3+2+1=6 poena. Druga boja je herc i tu imamo 4 poena. U karonu imamo nula poena i u trefu 2 poena.",
            },
            {
                question: "Koliko poena ima ova ruka? AK32 AT9432 K Q2",
                answers: ["16", "12", "7", "20"],
                correctAnswer: 0,
                hint: "As vredi 4 poena, kralj 3, dama 2 i pub 1.",
                explanation: "Prva boja je pik i u njemu imamo 4+3=7 poena. Druga boja je herc i tu imamo 4 poena. Treća boja je karo i tu imamo 3 poena. Četvrta boja je tref i tu imamo 2 poena.",
            },
            {
                question: "Koliko poena imamo zajedno sa partnerom ako mi držimo Qxx Qxxx Axxxx x, a partner drži KJxxx Kx / Axxxxx?",
                answers: ["8", "19", "11", "22"],
                correctAnswer: 1,
                hint: "Saberi poene u obe ruke.",
                explanation: "Mi imamo 8 poena, a partner ima 11 poena.",
            },
            {
                question: "Koliko imamo poena u hercu ako držimo KQxx AQJxx / Kxxx?",
                answers: ["15", "5", "3", "7"],
                correctAnswer: 3,
                hint: "Kada nekome dajemo ruku u bridžu podrazumevamo da su boje poređane po jačini odnosno prvo je pik onda herc, onda karo i onda tref.",
                explanation: "AQJxx ima 4+2+1=7 poena.",
            },
        ],
        medium: [
            {
                question: "Koliko štihova imamo ako držimo KQxx na AJx?",
                answers: ["3", "4", "5", "7"],
                correctAnswer: 1,
                hint: "Maksimalno možemo uzeti 4 štiha jer u dužoj ruci imamo 4 karte. Za svaku kartu koja moramo dati protivnicima prvo, gubimo štih.",
                explanation: "Imamo KQxx na AJx što je ekvivalentno za ovu priliku situaciji da imamo AKQJ na xxx gde imamo 4 štiha.",
            },
            {
                question: "Koliko štihova imamo ako držimo KQJT na xxx?",
                answers: ["1", "2", "3", "4"],
                correctAnswer: 2,
                hint: "Pošto nam fali as moramo izdati jedan štih.",
                explanation: "Nakon što izdamo asa K, Q i J su naši. Primeti da je svejedno da li su K, Q i J naši ili Q, J i T itd.",
            },
            {
                question: "Koliko sigurnih štihova imamo ako držimo Axxxx na KQxxx",
                answers: ["3", "4", "5", "10"],
                correctAnswer: 2,
                hint: "Ako jedan protivnik ima sve preostale karte, koliko karata će mu ostati nakon što odigramo A, K i Q?",
                explanation: "Sve protivnikove karte će uvek pasti pod A, K i Q jer protivnik može imati najviše 3 karte.",
            },
            {
                question: "Koliko štihova imamo ako držimo QJT na 9xxx?",
                answers: ["0", "1", "2", "3"],
                correctAnswer: 2,
                hint: "Ovo je slično prethodnoj situaciji sa KQJT na xxx.",
                explanation: "Nakon što isteramo asa i kralja sa npr. damom i pubom, nama će ostati T i 9 za nošenje štihova.",
            },
        ],
        hard: [
            {
                question: "Koliko štihova maksimalno možemo odneti ako držimo Axx na Qxx i oba protivnika imaju po 3 karte?",
                answers: ["0", "1", "2", "3"],
                correctAnswer: 2,
                hint: "Razmisli o ekspasu.",
                explanation: "As je sigurno naš. Posle toga kada odigramo malu kartu ka dami u 50% slučajeva će kralj biti na putu i odneti drugi štih. Nakon toga naša dama će odneti treći štih.",
            },
            {
                question: "Koliko štihova maksimalno možemo odneti ako držimo AJT na Qxx i oba protivnika imaju po 3 karte?",
                answers: ["0", "1", "2", "3"],
                correctAnswer: 3,
                hint: "Razmisli o impasu.",
                explanation: "Kada odigramo damu, ako protivnik stavi kralja mi ćemo odneti asa i posle toga ćemo imati J i T kao najveće karte. Ako protivnik ima kralja i ne stavi ga, kasnije možemo ponoviti igru malom kartom ka pubu. Opet, odnećemo 3 štiha u 50% slučajeva.",
            },
            {
                question: "Koliko štihova maksimalno možemo odneti ako držimo Axx na Jxx i oba protivnika imaju po 3 karte?",
                answers: ["0", "1", "2", "3"],
                correctAnswer: 1,
                hint: "Da li možemo napraviti impas?",
                explanation: "Analizom svih slučajeva možemo doći do zaključka da J ne znači ništa jer nam fale K i Q.",
            },
            {
                question: "Koliko štihova maksimalno možemo odneti ako držimo Axx na JT9 i oba protivnika imaju po 3 karte?",
                answers: ["0", "1", "2", "3"],
                correctAnswer: 2,
                hint: "Razmisli o (duplom) impasu.",
                explanation: "Ako oba protivnika imaju po jednu kartu od Q/K, onda kada odigramo puba i pustimo u krug, protivnik će odneti ali u drugom krugu kada držimo Ax na T9, druga od dve karte je u impasu. Slična je situacija ako protivnik između puba i asa ima obe od kralja i dame. Najgore je ako su obe karte iza keca u kom slučaju ćemo uzeti samo jedan štih.",
            },
            {
                question: "Koliko štihova maksimalno možemo odneti ako držimo AQT na xxx i oba protivnika imaju po 3 karte?",
                answers: ["0", "1", "2", "3"],
                correctAnswer: 3,
                hint: "Razmisli o (duplom) impasu.",
                explanation: "Mali ka T pa mali ka Q nosi sva tri štiha ako su i K i J ispred.",
            },
            {
                question: "Koliko štihova maksimalno možemo odneti ako držimo Axx na QT9 i oba protivnika imaju po 3 karte?",
                answers: ["0", "1", "2", "3"],
                correctAnswer: 2,
                hint: "Razmisli o (duplom) impasu.",
                explanation: "Nije lako videti da je ovo malo drugačije od prethodnog pitanja ali se mogu izanalizirati sve 4 moguće situacije. K i J kod E, K i J kod W, K kod E, J kod W i K kod W, J kod E.",
            },
            {
                question: "Koliko štihova maksimalno možemo odneti ako držimo AJx na xxx i oba protivnika imaju po 3 karte?",
                answers: ["0", "1", "2", "3"],
                correctAnswer: 2,
                hint: "Razmisli o (duplom) impasu.",
                explanation: "Ako su i K i Q ispred onda će moći da nam uzmu maksimalno jedan štih.",
            },
        ],
    };

    let currentCategory = '';
    let currentQuestionIndex = 0;
    let score = 0;
    let totalQuestions = 0;

    function startCategory(category) {
        currentCategory = category;
        currentQuestionIndex = 0;
        score = 0;
        totalQuestions = questions[category].length;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('question-section').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const questionData = questions[currentCategory][currentQuestionIndex];
        document.getElementById('question-title').textContent = `Pitanje ${currentQuestionIndex + 1}`;
        document.getElementById('question-text').textContent = questionData.question;

        let answersHtml = '';
        questionData.answers.forEach((answer, index) => {
            answersHtml += `<button class="answer-btn" onclick="checkAnswer(${index})">${answer}</button>`;
        });
        document.getElementById('answers-container').innerHTML = answersHtml;
        document.getElementById('hint-btn').style.display = 'inline-block';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('score').style.display = 'none';
        document.getElementById('next-btn').disabled = true;
    }

    function checkAnswer(selectedIndex) {
        const questionData = questions[currentCategory][currentQuestionIndex];
        const correctIndex = questionData.correctAnswer;

        const buttons = document.querySelectorAll('.answer-btn');
        if (selectedIndex === correctIndex) {
            buttons[selectedIndex].classList.add('correct');
            score++;
        } else {
            buttons[selectedIndex].classList.add('wrong');
            buttons[correctIndex].classList.add('correct-other');
        }

        // Disable all answers
        buttons.forEach(button => button.disabled = true);

        // Show explanation
        document.getElementById('explanation').textContent = questionData.explanation;
        document.getElementById('explanation').style.display = 'block';
        document.getElementById('score').style.display = 'block';
        document.getElementById('score').textContent = `Trenutni skor: ${score}`;
        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions[currentCategory].length - 1) {
            currentQuestionIndex++;
            showQuestion();
        } else {
            document.getElementById('question-section').style.display = 'none';
            const sectionBtn = document.querySelector(`button[onclick="startCategory('${currentCategory}')"]`);
            const percentage = ((score / totalQuestions) * 100).toFixed(2);
            sectionBtn.innerHTML = `Završeno (${percentage}%)`;
            document.getElementById('menu').style.display = 'block';
        }
    }

    function showHint() {
        const questionData = questions[currentCategory][currentQuestionIndex];
        alert(questionData.hint);
    }
</script>

</body>
</html>
